KAFKA_TRUSTSTORE_PATH: ""
KAFKA_CREDSTORE_PASSWORD: ""
KAFKA_SECURITY_PROTOCOL: "PLAINTEXT"
KAFKA_KEYSTORE_PATH: ""

NAIS_CLUSTER_NAME: test

spring:
  profiles:
    active: test
  flyway:
    enabled: true
    # Use the same datasource as Spring uses for `spring.datasource.*`.
    # (Avoid `spring.flyway.datasource` which isn't interpreted as a JDBC URL here.)
    baselineOnMigrate: true
    locations: 'classpath:db/migration/common'
  datasource:
    url: 'jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false'
    username: SA
    password:
    driver-class-name: 'org.h2.Driver'
    hikari:
      minimum-idle: 1
      maximum-pool-size: 3
  kafka:
    consumer:
      bootstrap-servers: "localhost:9092"
      group-id: "test-consumer-group"
  h2.console:
    enabled: true
    path: '/h2'

AKTIVITETSKRAV_FRONTEND_CLIENT_ID: dev-gcp:team-esyfo:aktivitetskrav-frontend
AKTIVITETSKRAV_MICRO_FRONTEND_CLIENT_ID: dev-gcp:team-esyfo:aktivitetskrav-microfrontend

management:
  endpoint.prometheus.enabled: true
  endpoints.web:
    base-path: /internal
    exposure.include: health,prometheus

no.nav.security.jwt:
  issuer:
    tokenx:
      discoveryurl: http://localhost:${mock-oauth2-server.port}/tokenx/.well-known/openid-configuration
      accepted_audience: ditt-sykefravaer-backend-client-id
