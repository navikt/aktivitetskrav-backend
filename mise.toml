[tools]
java = "21"

[tasks.build]
description = "Run build with gradle"
run = './gradlew build'

[tasks.test]
description = "Run tests with gradle"
run = './gradlew test'

[tasks.lint]
description = "Run ktlint check with gradle"
run = './gradlew ktlintCheck'

[tasks.format]
description = "Run ktlintFormat with gradle"
run = './gradlew ktlintFormat'

[tasks.verify]
description = "Run lint and tests"
depends = ["lint", "test"]
